# Checks backward compatibility between the PR head and its base branch.
name: backward_compat_snapshot_consistency

env:
  CARGO_TERM_COLOR: always
  ACTION_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
  RUST_BACKTRACE: "full"
  RUST_MIN_STACK: "8388608"
  SLACK_CHANNEL: ${{ secrets.SLACK_CHANNEL }}
  SLACK_ICON: https://pbs.twimg.com/profile_images/1274014582265298945/OjBKP9kn_400x400.png
  SLACK_USERNAME: ${{ secrets.BOT_USERNAME }}
  SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
  SLACKIFY_MARKDOWN: true

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  snapshot-consistency:
    name: backward_compat_snapshot_consistency/snapshot-consistency (bpr)
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-${{ github.head_ref || github.sha }}
      cancel-in-progress: ${{ github.event_name != 'push' }}
    steps:
      - name: Checkout tfhe-rs
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: 'false'

      - name: Fetch base commit
        env:
          BASE_REF: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: git fetch origin "$BASE_REF" --depth=1

      - name: Check backward compatibility
        env:
          BASE_REF: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: make backward_correctness BASE_REF="$BASE_REF"

      - name: Slack Notification
        if: ${{ failure() }}
        continue-on-error: true
        uses: rtCamp/action-slack-notify@e31e87e03dd19038e411e38ae27cbad084a90661
        env:
          SLACK_COLOR: ${{ job.status }}
          SLACK_MESSAGE: >-
            Backward compatibility check: ${{ job.status }}.
            [See details](${{ env.ACTION_RUN_URL }})
