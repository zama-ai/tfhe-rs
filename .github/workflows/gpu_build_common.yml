name: gpu_build_common

on:
  workflow_call:
    inputs:
      pull-request-number:  # ${{ github.event.pull_request.number }}
        type: number
        required: true
      run-pcc-gpu:
        type: boolean
        default: false
      run-compile-checks:
        type: boolean
        default: false
    secrets:
      REPO_CHECKOUT_TOKEN:
        required: true
      SLAB_ACTION_TOKEN:
        required: true
      SLAB_BASE_URL:
        required: true
      SLAB_URL:
        required: true
      JOB_SECRET:
        required: true
      SLACK_CHANNEL:
        required: true
      BOT_USERNAME:
        required: true
      SLACK_WEBHOOK:
        required: true

env:
  CARGO_TERM_COLOR: always
  ACTION_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
  RUSTFLAGS: "-C target-cpu=native"
  RUST_BACKTRACE: "full"
  RUST_MIN_STACK: "8388608"
  SLACK_CHANNEL: ${{ secrets.SLACK_CHANNEL }}
  SLACK_ICON: https://pbs.twimg.com/profile_images/1274014582265298945/OjBKP9kn_400x400.png
  SLACK_USERNAME: ${{ secrets.BOT_USERNAME }}
  SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
  SLACKIFY_MARKDOWN: true
  PULL_REQUEST_MD_LINK: ""

permissions:
  contents: read

# zizmor: ignore[concurrency-limits] only Zama organization members can trigger this workflow (via manual approval for PR from forks)

jobs:
  setup-instance:
    name: gpu_build_common/setup-instance
    runs-on: ubuntu-latest
    outputs:
      runner-name: ${{ steps.start-remote-instance.outputs.label }}
      cloud-provider: ${{ steps.start-remote-instance.outputs.cloud-provider }}
    steps:
      - name: Start remote instance
        id: start-remote-instance
        uses: zama-ai/slab-github-runner@d4a5bb6e2a4b8aa19a10f596d7f142006a7e2c21 # v1.6.3
        with:
          mode: start
          github-token: ${{ secrets.SLAB_ACTION_TOKEN }}
          slab-url: ${{ secrets.SLAB_BASE_URL }}
          job-secret: ${{ secrets.JOB_SECRET }}
          backend: aws
          profile: gpu-build

  cuda-checks:
    name: gpu_build_common/cuda-checks
    needs: setup-instance
    runs-on: ${{ needs.setup-instance.outputs.runner-name }}
    strategy:
      fail-fast: false
      # explicit include-based build matrix, of known valid options
      matrix:
        include:
          - os: ubuntu-22.04
            cuda: "12.8 12.2"
            gcc: 9
    steps:
      - name: Checkout tfhe-rs
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: 'false'
          token: ${{ secrets.REPO_CHECKOUT_TOKEN }}

      - name: Setup cloud GPU machine dependencies
        uses: ./.github/actions/gpu_setup
        with:
          cuda-version: ${{ matrix.cuda }}
          gcc-version: ${{ matrix.gcc }}
          cloud-provider: ${{ needs.setup-instance.outputs.cloud-provider }}
          requires-a-gpu: "false"

      - name: Install python3-venv
        run: sudo apt-get install -y python3-venv doxygen

      - name: Check doxygen on new GPU code
        run: python3 ci/check_doxygen_gpu.py
        env:
          GITHUB_BASE_REF: ${{ github.base_ref }}

      - name: Install latest stable
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # zizmor: ignore[stale-action-refs] this action doesn't create releases
        with:
          toolchain: stable

      - name: Run semgrep and lint checks on CUDA code
        if: inputs.run-pcc-gpu
        run: |
          make semgrep_and_lint_gpu_code

      - name: Run fmt checks
        if: inputs.run-pcc-gpu
        run: |
          make check_fmt_gpu

      - name: Run clippy checks
        if: inputs.run-pcc-gpu
        run: |
          make pcc_gpu_ci

      - name: Check build with hpu enabled
        if: inputs.run-pcc-gpu
        run: |
          make clippy_gpu_hpu

      - name: Run compilation checks for tests and benchmarks
        if: inputs.run-compile-checks
        run: |
          make check_compile_tests_benches_gpu

      - name: Run semver checks on tfhe-cuda-backend
        if: inputs.run-compile-checks
        run: |
          make semver_check_cuda_backend

      - name: Run semver checks on zk-cuda-backend
        if: inputs.run-compile-checks
        run: |
          make semver_check_zk_cuda_backend

      - name: Run semver checks on tfhe-cuda-common
        if: inputs.run-compile-checks
        run: |
          make semver_check_cuda_common

      - name: Set pull-request URL
        if: ${{ failure() }}
        run: |
          echo "PULL_REQUEST_MD_LINK=[pull-request](${PR_BASE_URL}${PR_NUMBER}), "  >> "${GITHUB_ENV}"
        env:
          PR_BASE_URL: ${{ vars.PR_BASE_URL }}
          PR_NUMBER: ${{ inputs.pull-request-number }}

      - name: Slack Notification
        if: ${{ failure() }}
        continue-on-error: true
        uses: rtCamp/action-slack-notify@33ca3be66c6f378fe1610fd1d5258632dbed5e58
        env:
          SLACK_COLOR: ${{ job.status }}
          SLACK_MESSAGE: "CUDA checks finished with status: ${{ job.status }}. (${{ env.PULL_REQUEST_MD_LINK }}[action run](${{ env.ACTION_RUN_URL }}))"

  teardown-instance:
    name: gpu_build_common/teardown-instance
    if: ${{ always() && needs.setup-instance.result == 'success' }}
    needs: [ setup-instance, cuda-checks ]
    runs-on: ubuntu-latest
    steps:
      - name: Stop remote instance
        id: stop-instance
        uses: zama-ai/slab-github-runner@d4a5bb6e2a4b8aa19a10f596d7f142006a7e2c21 # v1.6.3
        with:
          mode: stop
          github-token: ${{ secrets.SLAB_ACTION_TOKEN }}
          slab-url: ${{ secrets.SLAB_BASE_URL }}
          job-secret: ${{ secrets.JOB_SECRET }}
          label: ${{ needs.setup-instance.outputs.runner-name }}

      - name: Slack Notification
        if: ${{ failure() }}
        uses: rtCamp/action-slack-notify@33ca3be66c6f378fe1610fd1d5258632dbed5e58
        env:
          SLACK_COLOR: ${{ job.status }}
          SLACK_MESSAGE: "Instance teardown (cuda-checks) finished with status: ${{ job.status }}. (${{ env.ACTION_RUN_URL }})"
