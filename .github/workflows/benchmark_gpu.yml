# Run CUDA benchmarks on a Hyperstack VM and return parsed results to Slab CI bot.
name: benchmark_gpu

run-name: ${{ inputs.command }}::${{ inputs.bench_type}} (${{ inputs.profile }}, ${{ inputs.op_flavor }}, ${{ inputs.precisions_set }}, ${{ inputs.params_type }})

on:
  workflow_dispatch:
    inputs:
      backend:
        description: "Backends to use"
        default: hyperstack
        type: choice
        options:
          - hyperstack
          - scaleway (terraform)
      profile:
        description: "Instance type"
        required: true
        type: choice
        options:
          - "l40 (n3-L40x1)"
          - "4-l40 (n3-L40x4)"
          - "multi-a100-nvlink (n3-A100x8-NVLink)"
          - "single-h100 (n3-H100x1)"
          - "2-h100 (n3-H100x2)"
          - "4-h100 (n3-H100x4)"
          - "multi-h100 (n3-H100x8)"
          - "multi-h100-nvlink (n3-H100x8-NVLink)"
          - "multi-h100-sxm5 (n3-H100-SXM5x8)"
      command:
        description: "Benchmark command to run"
        type: choice
        default: integer
        options:
          - integer
          - integer_compression
          - pbs
          - pbs128
          - ks
          - ks_pbs
          - tfhe_zk_pok
          - msm_zk
          - integer_zk
          - integer_zk_experimental
          - integer_aes
          - integer_aes256
          - hlapi_erc7984
          - hlapi_dex
          - hlapi_noise_squash
      op_flavor:
        description: "Operations set to run"
        type: choice
        default: default
        options:
          - default
          - fast_default
          - unchecked
      precisions_set:
        description: "Bit precisions set"
        type: choice
        default: fast
        options:
          - fast
          - all
          - documentation
      bench_type:
        description: "Benchmarks type"
        type: choice
        default: latency
        options:
          - latency
          - throughput
          - both
      params_type:
        description: "Parameters type"
        type: choice
        default: multi_bit
        options:
          - classical
          - multi_bit
          - classical + multi_bit
          - classical_documentation
          - multi_bit_documentation
          - classical_documentation + multi_bit_documentation


permissions: {}

# zizmor: ignore[concurrency-limits] only Zama organization members can trigger this workflow

jobs:
  parse-inputs:
    name: benchmark_gpu/parse-inputs
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.parse_profile_and_hardware_name.outputs.backend }}
      profile: ${{ steps.parse_profile_and_hardware_name.outputs.profile }}
      hardware_name: ${{ steps.parse_profile_and_hardware_name.outputs.hardware }}
      additional_file_to_parse: ${{ steps.set_file_to_parse.outputs.additional_file_to_parse }}
    steps:
      - name: Parse profile and hardware name
        id: parse_profile_and_hardware_name
        shell: python
        env:
          INPUTS_BACKEND: ${{ inputs.backend }}
          INPUTS_PROFILE: ${{ inputs.profile }}
        run: |
          import os

          inputs_backend = os.environ["INPUTS_BACKEND"]
          inputs_profile = os.environ["INPUTS_PROFILE"]
          output_file = os.environ["GITHUB_OUTPUT"]

          split_profile = inputs_profile.split()
          parsed_profile = split_profile[0]
          parsed_hardware = split_profile[1].strip("(").strip(")")
          
          backend_name = inputs_backend
          
          if "terraform" in inputs_backend:
            backend_name = "terraform"
            provider_name = inputs_backend.split()[0]
            parsed_profile = provider_name + "-" + parsed_profile

          with open(output_file, "a") as f:
            for var_name, value in [
              ("backend", backend_name),
              ("profile", parsed_profile),
              ("hardware", parsed_hardware),
            ]:
              f.write(f"""{var_name}={value}\n""")

      - name: Get additional file to parse
        id: set_file_to_parse
        shell: python
        env:
          INPUTS_COMMAND: ${{ inputs.command }}
        run: |
          import os

          inputs_command = os.environ["INPUTS_COMMAND"]
          output_file = os.environ["GITHUB_OUTPUT"]

          files_to_parse = []

          if inputs_command == "integer_zk":
            files_to_parse.append("pke_zk_crs_sizes.csv")
          elif inputs_command == "hlapi_erc7984":
            files_to_parse.append("erc7984_pbs_count.csv")
          elif inputs_command == "hlapi_dex":
            files_to_parse.extend(
              [
                "dex_swap_request_update_dex_balance_pbs_count.csv",
                "dex_swap_request_finalize_pbs_count.csv",
                "dex_swap_claim_prepare_pbs_count.csv",
                "dex_swap_claim_update_dex_balance_pbs_count.csv"
              ]
            )

          with open(output_file, "a") as f:
            f.write(f"""additional_file_to_parse={",".join(files_to_parse)}\n""")

  run-benchmarks:
    name: benchmark_gpu/run-benchmarks
    needs: parse-inputs
    uses: ./.github/workflows/benchmark_gpu_common.yml
    with:
      backend: ${{ needs.parse-inputs.outputs.backend }}
      profile: ${{ needs.parse-inputs.outputs.profile }}
      hardware_name: ${{ needs.parse-inputs.outputs.hardware_name }}
      command: ${{ inputs.command }}
      op_flavor: ${{ inputs.op_flavor }}
      bench_type: ${{ inputs.bench_type }}
      params_type: ${{ inputs.params_type }}
      precisions_set: ${{ inputs.precisions_set }}
      additional_file_to_parse: ${{ needs.parse-inputs.outputs.additional_file_to_parse }}
    secrets:
      BOT_USERNAME: ${{ secrets.BOT_USERNAME }}
      SLACK_CHANNEL: ${{ secrets.SLACK_CHANNEL }}
      SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
      REPO_CHECKOUT_TOKEN: ${{ secrets.REPO_CHECKOUT_TOKEN }}
      JOB_SECRET: ${{ secrets.JOB_SECRET }}
      SLAB_ACTION_TOKEN: ${{ secrets.SLAB_ACTION_TOKEN }}
      SLAB_URL: ${{ secrets.SLAB_URL }}
      SLAB_BASE_URL: ${{ secrets.SLAB_BASE_URL }}
