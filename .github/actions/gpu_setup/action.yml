name: Setup Cuda
description: Setup Cuda on third-party or GitHub cloud-provider

inputs:
  cuda-version:
    description: Space-separated list of acceptable CUDA versions (e.g. "12.2 12.3"). The first match found is used; the first listed version is installed if none are present.
    required: true
  gcc-version:
    description: Version of GCC to use
    required: true
  cloud-provider:
    description: Cloud provider for the instance
    required: true
  requires-a-gpu:
    description: Requires a GPU
    default: "true"
    required: false

runs:
  using: "composite"
  steps:
    # Mandatory on hyperstack since a bootable volume is not re-usable yet.
    - name: Install dependencies
      shell: bash
      run: |
        wget https://github.com/Kitware/CMake/releases/download/v"${CMAKE_VERSION}"/cmake-"${CMAKE_VERSION}"-linux-x86_64.sh
        echo "${CMAKE_SCRIPT_SHA} cmake-${CMAKE_VERSION}-linux-x86_64.sh" > checksum
        sha256sum -c checksum
        sudo bash cmake-"${CMAKE_VERSION}"-linux-x86_64.sh --skip-license --prefix=/usr/ --exclude-subdir

        # Disable unattended-upgrades to avoid lock issues
        sudo systemctl mask --now unattended-upgrades
        sudo systemctl stop --now unattended-upgrades

        sudo apt-get clean
        sudo rm -rf /var/lib/apt/lists/*
        sudo apt purge -y unattended-upgrades

        sudo apt update
        sudo apt install -y cmake-format libclang-dev
      env:
        CMAKE_VERSION: 3.29.6
        CMAKE_SCRIPT_SHA: "6e4fada5cba3472ae503a11232b6580786802f0879cead2741672bf65d97488a"

    - name: Install GCC
      shell: bash
      env:
        GCC_VERSION: ${{ inputs.gcc-version }}
      run: |
        sudo apt-get install -y gcc-"${GCC_VERSION}" g++-"${GCC_VERSION}"
        sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-"${GCC_VERSION}" 20
        sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-"${GCC_VERSION}" 20

    - name: Check GCC
      shell: bash
      env:
        GCC_VERSION: ${{ inputs.gcc-version }}
      run: |
        which gcc-"${GCC_VERSION}"

    - name: Check CUDA installation
      id: check-cuda
      shell: bash
      env:
        CUDA_VERSION: ${{ inputs.cuda-version }}
      run: |
        # Split the space-separated version list into a bash array (-r: no backslash escaping, -a: array).
        read -ra CUDA_VERSIONS <<< "${CUDA_VERSION}"
        CUDA_VERSIONS_CSV=$(IFS=','; echo "${CUDA_VERSIONS[*]}")
        echo "Looking for ${#CUDA_VERSIONS[@]} CUDA version(s): ${CUDA_VERSIONS_CSV}"
        # "${CUDA_VERSIONS[@]}" expands each array element as a separate quoted argument.
        bash ci/detect_cuda.sh "${CUDA_VERSIONS[@]}" > /tmp/detect_cuda_output.txt 2>&1 || true
        cat /tmp/detect_cuda_output.txt
        if bash ci/detect_cuda.sh "${CUDA_VERSIONS[@]}" > /dev/null 2>&1; then
          echo "cuda-is-installed=true" >> "${GITHUB_OUTPUT}"
          echo "CUDA already installed, skipping installation"
        else
          echo "cuda-is-installed=false" >> "${GITHUB_OUTPUT}"
          echo "CUDA not found or version mismatch, installation required"
        fi

    - name: Install CUDA
      if: steps.check-cuda.outputs.cuda-is-installed != 'true'
      shell: bash
      env:
        CUDA_VERSION: ${{ inputs.cuda-version }}
        CUDA_KEYRING_PACKAGE: cuda-keyring_1.1-1_all.deb
        CUDA_KEYRING_SHA: "d93190d50b98ad4699ff40f4f7af50f16a76dac3bb8da1eaaf366d47898ff8df"
      run: |
        CUDA_INSTALL_VERSION="${CUDA_VERSION%% *}"
        # Use Sed to extract a value from a string, this cannot be done with the ${variable//search/replace} pattern.
        # shellcheck disable=SC2001
        TOOLKIT_VERSION="$(echo "${CUDA_INSTALL_VERSION}" | sed 's/\(.*\)\.\(.*\)/\1-\2/')"
        wget https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2204/x86_64/${CUDA_KEYRING_PACKAGE}
        echo "${CUDA_KEYRING_SHA} ${CUDA_KEYRING_PACKAGE}" > checksum
        sha256sum -c checksum
        sudo dpkg -i "${CUDA_KEYRING_PACKAGE}"

        # Disable unattended-upgrades to avoid lock issues
        sudo systemctl mask --now unattended-upgrades
        sudo systemctl stop --now unattended-upgrades

        sudo apt-get clean
        sudo rm -rf /var/lib/apt/lists/*
        sudo apt purge -y unattended-upgrades

        sudo apt update
        sudo apt -y install cuda-toolkit-"${TOOLKIT_VERSION}"

    - name: Export CUDA variables
      shell: bash
      env:
        CUDA_VERSION: ${{ inputs.cuda-version }}
      run: |
        # Split the space-separated version list into a bash array (-r: no backslash escaping, -a: array).
        read -ra CUDA_VERSIONS <<< "${CUDA_VERSION}"
        # "${CUDA_VERSIONS[@]}" expands each array element as a separate quoted argument.
        bash ci/export_cuda_vars.sh "${GITHUB_ENV}" "${GITHUB_PATH}" "${CUDA_VERSIONS[@]}" >&2

    # Specify the correct host compilers
    - name: Export gcc and g++ variables
      shell: bash
      run: |
        {
          echo "CC=/usr/bin/gcc-${GCC_VERSION}";
          echo "CXX=/usr/bin/g++-${GCC_VERSION}";
          echo "CUDAHOSTCXX=/usr/bin/g++-${GCC_VERSION}";
        } >> "${GITHUB_ENV}"
      env:
        GCC_VERSION: ${{ inputs.gcc-version }}

    # Detect nvcc: it should be in the PATH detected by detect_cuda.sh
    - name: Check setup
      shell: bash
      run: |
        command -v nvcc

    # On some machines the driver may not be in sync with the running image, reinstalling fixes it
    - name: Check device is detected and re-install driver if needed
      if: ${{ inputs.requires-a-gpu == 'true' }}
      shell: bash
      run: |
        nvidia-smi || (sudo apt install --reinstall -y nvidia-driver-580 && nvidia-smi)
