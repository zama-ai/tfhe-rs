module_name="hpu_regif_core_mhdma_2in3"
description="MHDMA register interface. Accessed by RPU for DMA command submission, completion interrupts, transceiver control, HBM addressing, and statistics."
word_size_b = 32
offset = 0x50000
range = 0x10000
ext_pkg = ["axi_if_common_param_pkg", "axi_if_shell_axil_pkg"]

# =====================================================================================================================
[section.mhdma_system]
description="system configuration"
offset= 0x0

[section.mhdma_system.register.lane]
  description="QSFP transceiver lane configuration"
  owner="User"
  read_access="Read"
  write_access="Write"
  field.select    = {size_b=2, offset_b=0,  default={Cst=0x0}, description="line selection"}
  field.loopback  = {size_b=3, offset_b=2,  default={Cst=0x0}, description="line loopback configurations"}
  field.rate      = {size_b=8, offset_b=5,  default={Cst=0x0}, description="line rates"}
  field.debug     = {size_b=1, offset_b=31, default={Cst=0x0}, description="States whether we are in debug mode"}

[section.mhdma_system.register.timeout_notify]
  description="Timeout: time before re-launching a request, in clock cycles"
  owner="User"
  read_access="Read"
  write_access="Write"
  field.notify_timeout_dur  = {size_b=32, offset_b=0,  default={Cst=0x48000000}, description="Notify retry timeout: mhdma clock cycles to wait for an ACK before re-sending the notify packet"}

[section.mhdma_system.register.timeout_read_req]
  description="Timeout: time before re-launching a request, in clock cycles"
  owner="User"
  read_access="Read"
  write_access="Write"
  field.read_req_timeout_dur = {size_b=32, offset_b=0, default={Cst=0x48000000}, description="Read-request retry timeout: mhdma clock cycles to wait for all ciphertext packets before re-sending the read request"}

[section.mhdma_system.register.retry_max]
  description="Timeout: maximum number of times we should do retries for both Notify & Retry "
  owner="User"
  read_access="Read"
  write_access="Write"
  field.retry_max_notify       = {size_b=8, offset_b=0, default={Cst=0xA}, description="Maximum number of retries to do before stopping and triggering error"}
  field.retry_max_read_request = {size_b=8, offset_b=8, default={Cst=0xA}, description="Maximum number of retries to do before stopping and triggering error"}

[section.mhdma_system.register.fsm_value]
  description="Packed read-only snapshot of all internal FSM states: [26:24] formatter, [20:18] slave notify-rx, [17:15] slave ciphertext-emission, [11:9] master read-request, [5:3] master notify"
  owner="Kernel"
  read_access="Read"
  write_access="None"
  default={Cst=0x0}

[section.mhdma_system.register.errors]
  description="Sticky error flags (cleared by reset_registers): [13] master read-request cmd queue overflow, [12] master notify cmd queue overflow, [11] formatter master cmd discard, [10] formatter slave cmd discard, [9] formatter payload gap, [8] decoder rx FIFO overflow, [7] slave read-request cmd queue overflow, [6] AXI4 HBM read response error, [5] master max retry read-request hit, [4] master max retry notify hit, [3] ciphertext sequence number mismatch, [2:1] per-PC AXI4 HBM write error, [0] multi-HPU one-hot ID violation"
  owner="Kernel"
  read_access="ReadNotify"
  write_access="None"
  default={Cst=0x0}

[section.mhdma_system.register.hpu_id]
  description="HPU table entry: [31] one-hot flag marking this entry as the local HPU, [23:0] 24-bit MAC address for Ethernet frame filtering and header generation"
  owner="User"
  read_access="Read"
  write_access="Write"
  default={Cst=0x0}
  duplicate=["_0", "_1", "_2", "_3", "_4", "_5", "_6", "_7"]

# =====================================================================================================================
[section.mhdma_reset]
offset= 0x90
description="Controllable resets for transceivers"

[section.mhdma_reset.register.datapath]
  description="GTM datapath resets"
  owner="User"
  read_access="Read"
  write_access="Write"
  field.rx_rst={size_b=4, offset_b=8, default={Cst=0x0}, description="resets on rx lane"}
  field.tx_rst={size_b=4, offset_b=4, default={Cst=0x0}, description="resets on tx lane"}
  field.gt_all={size_b=4, offset_b=0, default={Cst=0x0}, description="reset controlling both rx and tx at the same time"}

[section.mhdma_reset.register.monitor]
  description="Reset done flag for monitoring"
  owner="Kernel"
  read_access="Read"
  write_access="None"
  field.rst_done={size_b=8, offset_b=0, default={Cst=0x0}, description="Per-lane transceiver reset-done status flags (1 = reset complete, lane ready)"}

# =====================================================================================================================
[section.mhdma_request]
description="Request registers interface"
offset= 0x100

[section.mhdma_request.register.req_id]
  description="DMA command descriptor (WriteNotify enqueues into notify or read-request FIFO based on opcode)"
  owner="User"
  read_access="Read"
  write_access="WriteNotify"
  field.rsvd    = {size_b=8, offset_b=0,  default={Cst=0x0}, description="Unused : reserved for latter "}
  field.flag    = {size_b=6, offset_b=8,  default={Cst=0x0}, description="flag "}
  field.mode    = {size_b=2, offset_b=14, default={Cst=0x0}, description="mode "}
  field.node_id = {size_b=4, offset_b=16, default={Cst=0x0}, description="target HPU index in the hpu_id table"}
  field.req_id  = {size_b=4, offset_b=20, default={Cst=0x0}, description="command opcode: NOTIFY(0x2), ACK(0x3), READ(0x6), CT_EMISSION(0x7)"}
  field.iop_id  = {size_b=8, offset_b=24, default={Cst=0x0}, description="in-flight operation identifier assigned by firmware"}

[section.mhdma_request.register.req_addr]
  description="DMA command ciphertext addresses (must be written in same critical section as req_id)"
  owner="User"
  read_access="Read"
  write_access="WriteNotify"
  field.src = {size_b=16, offset_b=0,  default={Cst=0x0}, description="source ciphertext slot ID"}
  field.dst = {size_b=16, offset_b=16, default={Cst=0x0}, description="destination ciphertext slot ID"}

[section.mhdma_request.register.notify_req_id]
  description="Received notify command descriptor: populated by the slave when a notify arrives from another HPU (ReadNotify triggers interrupt)"
  owner="Kernel"
  read_access="ReadNotify"
  write_access="None"
  field.rsvd    = {size_b=8, offset_b=0,   default={Cst=0x0},    description="Unused : reserved for latter "}
  field.flag    = {size_b=6, offset_b=8,   default={Cst=0x0},    description="flag "}
  field.mode    = {size_b=2, offset_b=14,  default={Cst=0x0},    description="mode "}
  field.node_id = {size_b=4,  offset_b=16, default={Cst=0x0},    description="source HPU index"}
  field.req_id  = {size_b=4,  offset_b=20, default={Cst=0x0},    description="command opcode (always NOTIFY)"}
  field.iop_id  = {size_b=8,  offset_b=24, default={Cst=0x0},    description="in-flight operation identifier from the remote HPU"}

[section.mhdma_request.register.notify_req_addr]
  description="Received notify ciphertext addresses from the incoming notify packet"
  owner="Kernel"
  read_access="ReadNotify"
  write_access="None"
  field.src = {size_b=16, offset_b=0,  default={Cst=0x0}, description="source ciphertext slot ID"}
  field.dst = {size_b=16, offset_b=16, default={Cst=0x0}, description="destination ciphertext slot ID"}

[section.mhdma_request.register.read_request_req_id]
  description="Completed read-request descriptor: populated by the master after all ciphertext packets received and written to HBM (ReadNotify triggers interrupt)"
  owner="Kernel"
  read_access="ReadNotify"
  write_access="None"
  field.rsvd    = {size_b=8, offset_b=0,   default={Cst=0x0},    description="Unused : reserved for latter "}
  field.flag    = {size_b=6, offset_b=8,   default={Cst=0x0},    description="flag "}
  field.mode    = {size_b=2, offset_b=14,  default={Cst=0x0},    description="mode "}
  field.node_id = {size_b=4,  offset_b=16, default={Cst=0x0},    description="target HPU index that served the read"}
  field.req_id  = {size_b=4,  offset_b=20, default={Cst=0x0},    description="command opcode (always READ)"}
  field.iop_id  = {size_b=8,  offset_b=24, default={Cst=0x0},    description="in-flight operation identifier from the original request"}

[section.mhdma_request.register.read_request]
  description="Completed read-request ciphertext addresses of the fulfilled read request"
  owner="Kernel"
  read_access="ReadNotify"
  write_access="None"
  field.src = {size_b=16, offset_b=0,  default={Cst=0x0}, description="source ciphertext slot ID"}
  field.dst = {size_b=16, offset_b=16, default={Cst=0x0}, description="destination ciphertext slot ID"}

[section.mhdma_request.register.stat_notify]
  description="Number of notify packets sent"
  owner="Kernel"
  read_access="ReadNotify"
  write_access="None"
  default={Cst=0x0}
[section.mhdma_request.register.stat_notify_ack]
  description="Number of notify-ACK packets received"
  owner="Kernel"
  read_access="ReadNotify"
  write_access="None"
  default={Cst=0x0}
[section.mhdma_request.register.stat_notify_timeout_retry]
  description="Number of notify retries triggered by timeout expiration"
  owner="Kernel"
  read_access="ReadNotify"
  write_access="None"
  default={Cst=0x0}
[section.mhdma_request.register.stat_read_req_timeout_retry]
  description="Number of read-request retries triggered by timeout expiration"
  owner="Kernel"
  read_access="ReadNotify"
  write_access="None"
  default={Cst=0x0}
[section.mhdma_request.register.stat_read_req_seq_num_retry]
  description="Number of read-request retries triggered by sequence number mismatch"
  owner="Kernel"
  read_access="ReadNotify"
  write_access="None"
  default={Cst=0x0}

[section.mhdma_request.register.stat_nb_nack_received]
  description="Number of notify-ACK packets received by the decoder from the network"
  owner="Kernel"
  read_access="ReadNotify"
  write_access="None"
  default={Cst=0x0}
[section.mhdma_request.register.stat_nb_notify_received]
  description="Number of notify packets received by the decoder from the network"
  owner="Kernel"
  read_access="ReadNotify"
  write_access="None"
  default={Cst=0x0}
[section.mhdma_request.register.stat_nb_read_req_received]
  description="Number of read-request packets received by the decoder from the network"
  owner="Kernel"
  read_access="ReadNotify"
  write_access="None"
  default={Cst=0x0}
[section.mhdma_request.register.stat_nb_ce_received]
  description="Number of ciphertext-emission packets received by the decoder from the network"
  owner="Kernel"
  read_access="ReadNotify"
  write_access="None"
  default={Cst=0x0}
[section.mhdma_request.register.stat_nb_read_to_hbm]
  description="Number of AXI4 read transactions issued to HBM by the slave"
  owner="Kernel"
  read_access="ReadNotify"
  write_access="None"
  default={Cst=0x0}
[section.mhdma_request.register.stat_nb_words_received_pc]
  description="Per-PC count of AXI4 read data words received from HBM"
  owner="Kernel"
  read_access="ReadNotify"
  write_access="None"
  default={Cst=0x0}
  duplicate=["_pc0", "_pc1"]
[section.mhdma_request.register.stat_nb_ce_words_received]
  description="Number of ciphertext words received by the master after the last completed read request"
  owner="Kernel"
  read_access="ReadNotify"
  write_access="None"
  default={Cst=0x0}

[section.mhdma_request.register.stat_t_notify_to_ack]
  description="Latency in clock cycles from notify packet sent (tlast) to ACK received"
  owner="Kernel"
  read_access="Read"
  write_access="None"
  default={Cst=0x0}
[section.mhdma_request.register.stat_t_notify_to_ack_max]
  description="Maximum notify-to-ACK latency observed since last reset"
  owner="Kernel"
  read_access="Read"
  write_access="None"
  default={Cst=0x0}
[section.mhdma_request.register.stat_t_rr_to_ce_received]
  description="Latency in clock cycles from read-request sent to all ciphertext packets received"
  owner="Kernel"
  read_access="Read"
  write_access="None"
  default={Cst=0x0}
[section.mhdma_request.register.stat_t_rr_to_ce_received_max]
  description="Maximum read-request-to-ciphertext-received latency observed since last reset"
  owner="Kernel"
  read_access="Read"
  write_access="None"
  default={Cst=0x0}
[section.mhdma_request.register.stat_t_ce_first_to_last_pkt]
  description="Latency in clock cycles from first to last packet of a ciphertext emission sequence (decoder side)"
  owner="Kernel"
  read_access="Read"
  write_access="None"
  default={Cst=0x0}
[section.mhdma_request.register.stat_t_rr_wait_words_pc]
  description="Per-PC latency in clock cycles from AXI4 read issued to first read data received from HBM"
  owner="Kernel"
  read_access="Read"
  write_access="None"
  default={Cst=0x0}
  duplicate=["_pc0", "_pc1"]

[section.mhdma_request.register.stat_cur_notify_to_ack]
  description="Live value of the notify timeout counter (resets on each new notify send)"
  owner="Kernel"
  read_access="Read"
  write_access="None"
  default={Cst=0x0}

[section.mhdma_request.register.stat_physical_addr]
  description="Per-PC physical HBM address of the last AXI4 transaction (debug, LSB/MSB pairs)"
  owner="Kernel"
  read_access="Read"
  write_access="None"
  default={Cst=0x0}
  duplicate=["_pc0_lsb", "_pc0_msb","_pc1_lsb", "_pc1_msb"]

[section.mhdma_request.register.stat_cnt_nb_write_complete]
  description="Number of completed AXI4 write transactions to HBM (per-PC rising-edge count)"
  owner="Kernel"
  read_access="Read"
  write_access="None"
  default={Cst=0x0}

[section.mhdma_request.register.stat_nb_notify_sent]
  description="Number of notify packets sent by the formatter (TX-side counterpart of stat_notify)"
  owner="Kernel"
  read_access="ReadNotify"
  write_access="None"
  default={Cst=0x0}
[section.mhdma_request.register.stat_nb_ce_sent]
  description="Number of ciphertext-emission sequences sent by the formatter"
  owner="Kernel"
  read_access="ReadNotify"
  write_access="None"
  default={Cst=0x0}
[section.mhdma_request.register.stat_nb_notify_ack_sent]
  description="Number of notify-ACK packets sent by the formatter"
  owner="Kernel"
  read_access="ReadNotify"
  write_access="None"
  default={Cst=0x0}
[section.mhdma_request.register.stat_nb_read_req_sent]
  description="Number of read-request packets sent by the master"
  owner="Kernel"
  read_access="ReadNotify"
  write_access="None"
  default={Cst=0x0}
[section.mhdma_request.register.stat_t_hbm_write_latency]
  description="Latency in clock cycles from first AXI4 write address accepted to all write responses received"
  owner="Kernel"
  read_access="Read"
  write_access="None"
  default={Cst=0x0}
[section.mhdma_request.register.stat_t_hbm_write_latency_max]
  description="Maximum HBM write latency observed since last reset"
  owner="Kernel"
  read_access="Read"
  write_access="None"
  default={Cst=0x0}
[section.mhdma_request.register.stat_t_hbm_write_latency_min]
  description="Minimum HBM write latency observed since last reset (initialized to 0xFFFFFFFF)"
  owner="Kernel"
  read_access="Read"
  write_access="None"
  default={Cst=0x0}
[section.mhdma_request.register.stat_t_notify_to_ack_min]
  description="Minimum notify-to-ACK latency observed since last reset (initialized to 0xFFFFFFFF)"
  owner="Kernel"
  read_access="Read"
  write_access="None"
  default={Cst=0x0}
[section.mhdma_request.register.stat_t_rr_to_ce_received_min]
  description="Minimum read-request-to-ciphertext-received latency observed since last reset (initialized to 0xFFFFFFFF)"
  owner="Kernel"
  read_access="Read"
  write_access="None"
  default={Cst=0x0}
[section.mhdma_request.register.stat_nb_decoder_dropped]
  description="Number of received packets dropped by the decoder (wrong MAC address or unrecognized opcode)"
  owner="Kernel"
  read_access="ReadNotify"
  write_access="None"
  default={Cst=0x0}

# =====================================================================================================================
[section.mhdma_lane]
offset= 0x200
description="Line parameter sections"

[section.mhdma_lane.register.debug]
  description="Different parameters for debugging qsfp lines"
  owner="User"
  read_access="Read"
  write_access="Write"
  field.rx_to_tx        = {size_b=1, offset_b=29, default={Cst=0x0}, description="a"}
  field.tx_loop         = {size_b=1, offset_b=30, default={Cst=0x0}, description="b"}
  field.reset_registers = {size_b=1, offset_b=31, default={Cst=0x0}, description="c"}

# =====================================================================================================================
[section.mhdma_hbm_axi4_addr_2in3]
offset= 0x1000
description="HBM AXI4 connection address offset"

[section.mhdma_hbm_axi4_addr_2in3.register.ct]
  description="Per-PC HBM base address for ciphertext storage. Physical addr = base + (slot_id x CT_MEM_BYTES). 64-bit pairs (LSB/MSB) per pseudo-channel."
  owner="User"
  read_access="Read"
  write_access="Write"
  duplicate=["_pc0_lsb", "_pc0_msb","_pc1_lsb", "_pc1_msb"]
