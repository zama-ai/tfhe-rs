rules:
  - id: release-missing-cuda-synchronize
    message: >-
      release() method does not call cuda_synchronize_stream or delegate to
      another release(). All release methods must synchronize the CUDA stream
      (directly or via delegation) to ensure async GPU operations complete
      before returning.
    severity: ERROR
    languages: [cpp]
    paths:
      exclude:
        - "**/helper_multi_gpu.h"
    patterns:
      - pattern: |
          void release(...) {
            ...
          }
      - pattern-not: |
          void release(...) {
            ...
            cuda_synchronize_stream($S.stream(0), ...);
            ...
          }
      - pattern-not: |
          void release(cudaStream_t stream, ...) {
            ...
            cuda_synchronize_stream(stream, ...);
            ...
          }
      - pattern-not: |
          void release(...) {
            ...
            $MEM->release(...);
            ...
          }


  - id: cleanup-missing-release-or-synchronize
    message: >-
      cleanup_ function does not call release() or cuda_synchronize_stream().
      All non-async cleanup_ functions must either call release() on a memory
      structure or synchronize the CUDA stream.
    severity: ERROR
    languages: [cpp]
    patterns:
      - pattern: |
          void $FUNC(...) {
            ...
          }
      - metavariable-regex:
          metavariable: $FUNC
          regex: ^cleanup_.*(?<!_async)$
      - pattern-not: |
          void $FUNC(...) {
            ...
            $MEM->release(...);
            ...
          }
      - pattern-not: |
          void $FUNC(...) {
            ...
            cuda_synchronize_stream(...);
            ...
          }

  - id: tfhe-cuda-unwrapped-cuda-runtime-call
    message: "CUDA runtime API call is not wrapped in `check_cuda_error(...)`."
    severity: WARNING
    languages: [c, cpp]
    options:
      generic_ellipsis_max_span: 500
    paths:
      include:
        - "*.cu"
        - "*.cuh"
        - "*.cpp"
        - "*.h"
      exclude:
        - backends/tfhe-cuda-backend/cuda/check_cuda.cu # contains cuda checking functions
        - backends/tfhe-cuda-backend/cuda/include/device.h # contains the cuda_check_error macro (and others)
    patterns:
      - pattern: $FUNC(...)
      - metavariable-regex:
          metavariable: $FUNC
          regex: "^cuda[A-Z][A-Za-z0-9]*$" # matches cudaMalloc/cudaMemcpy/... (not project helpers like cuda_set_device)
      - pattern-not-inside: check_cuda_error(...)
      - pattern-not-inside: |
          $FUNC(...);
          check_cuda_error(cudaGetLastError());
      - pattern-not-inside: $FUNC(...) == $VAL