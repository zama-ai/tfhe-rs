[package]
name = "tfhe-lints-common"
version = "0.1.0"
description = "Shared utilities for TFHE-rs lints"
edition = "2021"
publish = false

[lib]
test = false
doctest = false

[dependencies]
clippy_utils = { git = "https://github.com/rust-lang/rust-clippy", rev = "54482290b5f32e6c6b57cc9e0a17153f432b0036" }
dylint_linting = "5.0.0"

[package.metadata.rust-analyzer]
rustc_private = true
