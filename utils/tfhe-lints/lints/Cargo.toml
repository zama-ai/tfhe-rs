[package]
name = "tfhe-lints"
version = "0.1.0"
description = "Project specific lints for TFHE-rs"
edition = "2024"
publish = false
autotests = false

[lib]
crate-type = ["cdylib"]

[dependencies]
clippy_utils = { workspace = true }
dylint_linting = { workspace = true }
tfhe-lints-common = { path = "../common" }

[dev-dependencies]
dylint_testing = "5.0.0"
serde = { version = "1.0", features = ["derive"] }
tfhe-versionable = { version = "0.7.0", path = "../../tfhe-versionable" }

[package.metadata.rust-analyzer]
rustc_private = true

[[example]]
name = "serialize_without_versionize"
path = "tests/serialize_without_versionize/main.rs"

[[example]]
name = "invalid_versionize_dispatch"
path = "tests/invalid_versionize_dispatch/main.rs"

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = [
    'cfg(dylint_lib, values(any()))',
] }
