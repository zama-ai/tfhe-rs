[package]
name = "compat_15"
version = "0.1.0"
edition = "2021"
license = "BSD-3-Clause-Clear"

# Own workspace so its tfhe pin is resolved independently of compat_16.
[workspace]

[dependencies]
tfhe = { version = "=1.5.3", features = ["integer", "zk-pok"] }
# Pin transitive deps to the versions that shipped with tfhe 1.5.3.
tfhe-csprng = "=0.8.0"
tfhe-versionable = "=0.7.0"
tfhe-zk-pok = "=0.8.0"
forward-common = { path = "../forward-common" }
