# cargo-deny configuration: https://embarkstudios.github.io/cargo-deny/

[licenses]
version = 2
confidence-threshold = 1.0
unused-allowed-license = "allow"
allow = [
    "0BSD",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSD-3-Clause-Clear",
    "BSL-1.0",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "ISC",
    "MIT",
    "MPL-2.0",
    "Unicode-3.0",
    "Unlicense",
    "Zlib",
]

[licenses.private]
# Skip license enforcement on workspace members marked `publish = false`
ignore = true
